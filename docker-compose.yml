version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: electropms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: electropms
      POSTGRES_USER: electropms
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./database/indexes.sql:/docker-entrypoint-initdb.d/03-indexes.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electropms"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (Cache + Session + Queue) ────────────
  redis:
    image: redis:7-alpine
    container_name: electropms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  # ─── Backend (FastAPI) ──────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: electropms-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://electropms:secret@postgres:5432/electropms
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Frontend (Vite Dev) ────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: electropms-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  uploads:
